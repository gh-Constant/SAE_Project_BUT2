      bearerFormat: JWT
      description: Token JWT obtenu via /auth/login

  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: Identifiant unique de l'utilisateur
      schema:
        type: integer
        minimum: 1
      example: 1

    LocationId:
      name: locationId
      in: path
      required: true
      description: Identifiant unique de la location
      schema:
        type: integer
        minimum: 1
      example: 1

    ProductId:
      name: id
      in: path
      required: true
      description: Identifiant unique du produit
      schema:
        type: integer
        minimum: 1
      example: 1

    EventId:
      name: id
      in: path
      required: true
      description: Identifiant unique de l'événement
      schema:
        type: integer
        minimum: 1
      example: 1

    QuestId:
      name: questId
      in: path
      required: true
      description: Identifiant unique de la quête
      schema:
        type: integer
        minimum: 1
      example: 1

    BlogId:
      name: id
      in: path
      required: true
      description: Identifiant unique de l'article
      schema:
        type: integer
        minimum: 1
      example: 1

  schemas:
    # ===== AUTH SCHEMAS =====
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: BonneAnne2026!

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'

    UserInput:
      type: object
      required: [firstName, lastName, email, password, role]
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 100
          example: Jean
        lastName:
          type: string
          minLength: 2
          maxLength: 100
          example: Dupont
        email:
          type: string
          format: email
          example: jean.dupont@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: BonneAnnee2026!
        role:
          type: string
          enum: [admin, aventurier, prestataire]
          example: aventurier
        avatarUrl:
          type: string
          example: /avatars/default.png
        avatarType:
          type: string
          enum: [gallery, upload]
          example: gallery
        prestataireTypeId:
          type: integer
          nullable: true
          example: 1

    ProfileUpdate:
      type: object
      properties:
        firstname:
          type: string
          example: Jean
        lastname:
          type: string
          example: Dupont
        email:
          type: string
          format: email
          example: jean.dupont@example.com
        avatarUrl:
          type: string
          example: /avatars/pirate.png
        avatarType:
          type: string
          enum: [gallery, upload]
        birthDate:
          type: string
          format: date
          example: '1990-01-15'
        phone:
          type: string
          example: '+33612345678'
        bio:
          type: string
          maxLength: 500
          example: Aventurier passionné de découvertes
        prestataireTypeId:
          type: integer
          nullable: true
          example: 1

    User:
      type: object
      properties:
        id_user:
          type: integer
          example: 1
        firstname:
          type: string
          example: Jean
        lastname:
          type: string
          example: Dupont
        email:
          type: string
          format: email
          example: jean.dupont@example.com
        role:
          type: string
          enum: [admin, aventurier, prestataire]
          example: aventurier
        avatar_url:
          type: string
          example: /avatars/pirate.png
        avatar_type:
          type: string
          enum: [gallery, upload]
          example: gallery
        level:
          type: integer
          example: 5
        xp:
          type: number
          example: 1250.5
        gold:
          type: integer
          example: 100
        is_verified:
          type: boolean
          example: true
        birth_date:
          type: string
          format: date
          nullable: true
        phone:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ===== LOCATION SCHEMAS =====
    Location:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Taverne du Dragon
        description:
          type: string
          nullable: true
          example: Une taverne mystérieuse au cœur de la forêt
        static_code:
          type: string
          nullable: true
          example: LOC001
        price:
          type: number
          example: 150.00
        purchased:
          type: boolean
          example: false
        position:
          type: object
          properties:
            lat:
              type: number
              example: 48.8566
            lng:
              type: number
              example: 2.3522
        icon_name:
          type: string
          nullable: true
          example: tavern-icon
        banner_image:
          type: string
          nullable: true
          example: /banners/tavern.jpg
        id_prestataire:
          type: integer
          nullable: true
          example: 5
        id_location_type:
          type: integer
          example: 1
        prestataire:
          type: object
          nullable: true
          properties:
            id_user:
              type: integer
            firstname:
              type: string
            lastname:
              type: string
            avatar_url:
              type: string
            avatar_type:
              type: string

    LocationUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        banner_image:
          type: string
        price:
          type: number
        has_water_access:
          type: boolean
        has_electricity:
          type: boolean
        has_toilets:
          type: boolean
        is_accessible_pmr:
          type: boolean
        purchased:
          type: boolean
        id_prestataire:
          type: integer
          nullable: true
        id_location_type:
          type: integer

    # ===== PRODUCT SCHEMAS =====
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Potion de vie
        description:
          type: string
          nullable: true
          example: Restaure 50 points de vie
        price:
          type: number
          example: 25.00
        imageUrl:
          type: string
          nullable: true
          example: /products/potion.png
        stock:
          type: integer
          example: 100
        locationId:
          type: integer
          example: 1
        id_prestataire:
          type: integer
          example: 5

    ProductInput:
      type: object
      required: [name, price, id_prestataire]
      properties:
        name:
          type: string
          example: Potion de vie
        description:
          type: string
          example: Restaure 50 points de vie
        price:
          type: number
          example: 25.00
        imageUrl:
          type: string
          example: /products/potion.png
        id_prestataire:
          type: integer
          example: 5
        locationId:
          type: integer
          example: 1
        stock:
          type: integer
          example: 100

    # ===== EVENT SCHEMAS =====
    Event:
      type: object
      properties:
        id_event:
          type: integer
          example: 1
        title:
          type: string
          example: Festival des Lumières
        description:
          type: string
          nullable: true
          example: Un festival magique illuminant la nuit
        start_time:
          type: string
          format: date-time
          example: '2025-01-15T18:00:00Z'
        end_time:
          type: string
          format: date-time
          example: '2025-01-15T23:00:00Z'
        price:
          type: number
          example: 15.00
        capacity:
          type: integer
          example: 200
        sold:
          type: integer
          example: 45
        id_location:
          type: integer
          example: 1

    EventInput:
      type: object
      required: [title, start_time, end_time, price, capacity, id_location]
      properties:
        title:
          type: string
          example: Festival des Lumières
        description:
          type: string
          example: Un festival magique illuminant la nuit
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        price:
          type: number
          example: 15.00
        capacity:
          type: integer
          example: 200
        id_location:
          type: integer
          example: 1

    BookingInput:
      type: object
      required: [id_event, quantity]
      properties:
        id_event:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    EventReservation:
      type: object
      properties:
        id_reservation:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        total_price:
          type: number
          example: 30.00
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED]
          example: CONFIRMED
        created_at:
          type: string
          format: date-time
        id_user:
          type: integer
        id_event:
          type: integer

    # ===== QUEST SCHEMAS =====
    Quest:
      type: object
      properties:
        id_quest:
          type: integer
          example: 1
        title:
          type: string
          example: Trouver le trésor caché
        description:
          type: string
          example: Explorez la forêt pour trouver le coffre mystérieux
        xp_reward:
          type: integer
          example: 150
        id_location:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time

    QuestInput:
      type: object
      required: [title, xp_reward, id_location]
      properties:
        title:
          type: string
          example: Trouver le trésor caché
        description:
          type: string
          example: Explorez la forêt pour trouver le coffre mystérieux
        xp_reward:
          type: integer
          minimum: 1
          example: 150
        id_location:
          type: integer
          example: 1

    UserQuest:
      type: object
      properties:
        id_user:
          type: integer
        id_quest:
          type: integer
        status:
          type: string
          enum: [ACCEPTED, COMPLETED, CANCELLED]
        accepted_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        quest:
          $ref: '#/components/schemas/Quest'

    # ===== BLOG SCHEMAS =====
    Blog:
      type: object
      properties:
        id_blog:
          type: integer
          example: 1
        title:
          type: string
          example: Découvrez notre nouvelle carte
        content:
          type: string
          example: <p>Nous avons le plaisir de vous annoncer...</p>
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        id_location:
          type: integer
          example: 1

    BlogInput:
      type: object
      required: [title, content, locationId]
      properties:
        title:
          type: string
          example: Découvrez notre nouvelle carte
        content:
          type: string
          example: <p>Nous avons le plaisir de vous annoncer...</p>
        locationId:
          type: integer
          example: 1

    # ===== QRCODE SCHEMAS =====
    QRSession:
      type: object
      properties:
        id:
          type: string
          example: session_abc123
        token:
          type: string
          example: qr_abc123xyz789
        qrCodeUrl:
          type: string
          example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...
        status:
          type: string
          enum: [pending, validated, used, expired]
          example: pending
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        userId:
          type: integer
          nullable: true
          example: null
        questId:
          type: integer
          nullable: true
          example: null

    # ===== ERROR SCHEMAS =====
    Error:
      type: object
      properties:
        error:
          type: string
          example: Une erreur est survenue
        message:
          type: string
          example: Message d'erreur détaillé

    # ===== CONTACT SCHEMAS =====
    ContactMessage:
      type: object
      properties:
        id_contact:
          type: integer
          example: 1
        name:
          type: string
          example: Jean Dupont
        email:
          type: string
          format: email
          example: jean@example.com
        message:
          type: string
          example: Bonjour, j'aimerais savoir...
        id_location:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time

    ContactMessageInput:
      type: object
      required: [name, email, message, id_location]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        message:
          type: string
        id_location:
          type: integer

    # ===== MESSAGING SCHEMAS =====
    Conversation:
      type: object
      properties:
        id_conversation:
          type: integer
          example: 1
        id_user:
          type: integer
          example: 1
        id_location:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        lastMessage:
          $ref: '#/components/schemas/Message'

    Message:
      type: object
      properties:
        id_message:
          type: integer
          example: 101
        content:
          type: string
          example: Bonjour, est-ce disponible ?
        sender_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        read:
          type: boolean
          example: false

    MessageInput:
      type: object
      required: [content, conversationId]
      properties:
        content:
          type: string
        conversationId:
          type: integer

    ConversationInput:
      type: object
      required: [locationId, message]
      properties:
        locationId:
          type: integer
        message:
          type: string

    # ===== QUIZ SCHEMAS =====
    Quiz:
      type: object
      properties:
        id_quiz:
          type: integer
          example: 1
        title:
          type: string
          example: Quiz Histoire Médiévale
        description:
          type: string
        id_location:
          type: integer
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'

    QuizInput:
      type: object
      required: [title, id_location, questions]
      properties:
        title:
          type: string
        description:
          type: string
        id_location:
          type: integer
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionInput'

    Question:
      type: object
      properties:
        id_question:
          type: integer
        text:
          type: string
        points:
          type: integer
        answers:
          type: array
          items:
            $ref: '#/components/schemas/Answer'

    QuestionInput:
      type: object
      properties:
        text:
          type: string
        points:
          type: integer
        answers:
          type: array
          items:
            $ref: '#/components/schemas/AnswerInput'

    Answer:
      type: object
      properties:
        id_answer:
          type: integer
        text:
          type: string
        is_correct:
          type: boolean

    AnswerInput:
      type: object
      properties:
        text:
          type: string
        is_correct:
          type: boolean

    # ===== ORDER SCHEMAS =====
    Order:
      type: object
      properties:
        id_order:
          type: integer
        total_price:
          type: number
        status:
          type: string
          enum: [PENDING, PAID, CANCELLED]
        items:
          type: array
          items:
            type: object
            properties:
              id_product:
                type: integer
              quantity:
                type: integer
              price:
                type: number

    OrderInput:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId:
                type: integer
              quantity:
                type: integer

    # ===== QRCODE SCHEMAS =====
    QRCodeStatus:
      type: object
      properties:
        status:
          type: string
          enum: [valid, used, expired, invalid]
        data:
          type: object

  responses:
    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Ressource non trouvée

    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Données de requête invalides

    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Non autorisé

    Forbidden:
      description: Accès interdit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Accès interdit - permissions insuffisantes

    ServerError:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Erreur serveur interne
