openapi: 3.0.3

info:
  title: SAE Project BUT2 API
  description: |
    API REST pour notre application web "Les Terres Du Lions".

    ## Fonctionnalités
    - Authentification et gestion des utilisateurs avec (JWT)
    - Gestion des locations (points d'intérêt)
    - Catalogue de produits 
    - Événements et réservations
    - Système de quêtes gamifié
    - Blog et articles
    - QR Codes
    
    ## Authentification
    Les routes protégées nécessitent un token JWT dans le header `Authorization: Bearer <token>`.

servers:
  - url: http://localhost:3000/api/v1
    description: Serveur de développement local

tags:
  - name: Auth
    description: Authentification et gestion de session
  - name: Users
    description: Gestion des utilisateurs (Admin)
  - name: Stats
    description: Statistiques et tableaux de bord
  - name: Locations
    description: Points d'intérêt et établissements
  - name: Products
    description: Catalogue de produits
  - name: Events
    description: Événements et réservations
  - name: Quests
    description: Système de quêtes gamifié
  - name: Blogs
    description: Articles et contenus
  - name: Orders
    description: Commandes et panier
  - name: QRCode
    description: Génération et scan de QR codes
  - name: System
    description: Health check et configuration
  - name: Contact
    description: Formulaire de contact et messages
  - name: Messaging
    description: Messagerie privée entre utilisateurs
  - name: Quizzes
    description: Gestion des quiz et tentatives
  - name: Upload
    description: Upload de fichiers
  - name: Gold
    description: Achat et consultation du solde de gold
  - name: Non-Trivial
    description: Routes complexes avec logique métier avancée (≥2 tables + algorithmes)

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authentifier un utilisateur
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Auth]
      summary: Inscrire un nouvel utilisateur
      operationId: register
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/UserInput'
                - type: object
                  properties:
                    avatarFile:
                      type: string
                      format: binary
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/google:
    get:
      tags: [Auth]
      summary: Démarrer l'authentification Google
      operationId: startGoogleOAuth
      responses:
        '302':
          description: Redirection vers Google OAuth

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Callback OAuth Google
      operationId: handleGoogleOAuthCallback
      responses:
        '302':
          description: Redirection vers le frontend avec le résultat OAuth

  /auth/discord:
    get:
      tags: [Auth]
      summary: Démarrer l'authentification Discord
      operationId: startDiscordOAuth
      responses:
        '302':
          description: Redirection vers Discord OAuth

  /auth/discord/callback:
    get:
      tags: [Auth]
      summary: Callback OAuth Discord
      operationId: handleDiscordOAuthCallback
      responses:
        '302':
          description: Redirection vers le frontend avec le résultat OAuth

  /auth/me:
    get:
      tags: [Auth]
      summary: Récupérer l'utilisateur connecté
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Utilisateur récupéré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/role:
    get:
      tags: [Auth]
      summary: Récupérer le rôle de l'utilisateur connecté
      operationId: getMyRole
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Rôle récupéré
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    enum: [admin, aventurier, prestataire]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/security:
    get:
      tags: [Auth]
      summary: Récupérer les paramètres de sécurité du compte
      operationId: getSecurity
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paramètres de sécurité récupérés
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasPassword:
                    type: boolean
                  linkedProviders:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                          enum: [google, discord]
                        email:
                          type: string
                          nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password/setup-request:
    post:
      tags: [Auth]
      summary: Demander la création d'un mot de passe
      operationId: requestPasswordSetup
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Email de configuration envoyé
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/oauth/confirm-link:
    post:
      tags: [Auth]
      summary: Confirmer la liaison OAuth par email
      operationId: confirmOAuthLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Compte OAuth lié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/profile:
    put:
      tags: [Auth]
      summary: Mettre à jour le profil utilisateur
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/ProfileUpdate'
                - type: object
                  properties:
                    avatarFile:
                      type: string
                      format: binary
      responses:
        '200':
          description: Profil mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/oauth/{provider}/link:
    post:
      tags: [Auth]
      summary: Préparer la liaison d'un provider OAuth
      operationId: prepareOAuthLink
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, discord]
      responses:
        '200':
          description: Liaison OAuth préparée
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Auth]
      summary: Délier un provider OAuth
      operationId: unlinkOAuth
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, discord]
      responses:
        '200':
          description: Provider OAuth délié
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/account:
    delete:
      tags: [Auth]
      summary: Supprimer son compte
      operationId: deleteMyAccount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Compte supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    put:
      tags: [Auth]
      summary: Changer le mot de passe
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Mot de passe modifié
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Demander une réinitialisation de mot de passe
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Demande prise en compte
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Réinitialiser le mot de passe
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Mot de passe réinitialisé
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/leaderboard:
    get:
      tags: [Users]
      summary: Récupérer le classement global
      operationId: getLeaderboard
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Classement récupéré
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{id}/rank:
    get:
      tags: [Users]
      summary: Récupérer le rang d'un utilisateur
      operationId: getUserRank
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Rang récupéré
          content:
            application/json:
              schema:
                type: object
                properties:
                  rank:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags: [Users]
      summary: Lister tous les utilisateurs
      operationId: getAllUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}/verify:
    post:
      tags: [Users]
      summary: Vérifier un utilisateur
      operationId: verifyUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Utilisateur vérifié
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}:
    delete:
      tags: [Users]
      summary: Supprimer un utilisateur
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Utilisateur supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations:
    get:
      tags: [Locations]
      summary: Lister toutes les locations
      operationId: getAllLocations
      responses:
        '200':
          description: Liste des locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'

  /locations/{id}:
    get:
      tags: [Locations]
      summary: Récupérer une location par ID
      operationId: getLocationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Location trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Locations]
      summary: Mettre à jour une location
      operationId: updateLocation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdate'
      responses:
        '200':
          description: Location mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Locations]
      summary: Supprimer une location
      operationId: deleteLocation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Location supprimée
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}/purchase:
    post:
      tags: [Locations]
      summary: Acheter une location
      operationId: purchaseLocation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Achat enregistré
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /locations/{id}/validate:
    post:
      tags: [Locations]
      summary: Valider l'achat d'une location
      operationId: validatePurchase
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Achat validé
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}/reject:
    post:
      tags: [Locations]
      summary: Rejeter l'achat d'une location
      operationId: rejectPurchase
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Achat rejeté
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /locations/{id}/owner:
    put:
      tags: [Locations]
      summary: Mettre à jour le propriétaire d'une location
      operationId: updateOwner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Propriétaire mis à jour
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Locations]
      summary: Retirer le propriétaire d'une location
      operationId: removeOwner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Propriétaire retiré
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /products:
    get:
      tags: [Products]
      summary: Lister tous les produits
      operationId: getAllProducts
      responses:
        '200':
          description: Liste des produits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags: [Products]
      summary: Créer un produit
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Produit créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/{id}:
    get:
      tags: [Products]
      summary: Récupérer un produit par ID
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Produit trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Products]
      summary: Mettre à jour un produit
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Produit mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Products]
      summary: Supprimer un produit
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Produit supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events:
    get:
      tags: [Events]
      summary: Lister tous les événements
      operationId: getEvents
      responses:
        '200':
          description: Liste des événements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
    post:
      tags: [Events]
      summary: Créer un événement
      operationId: createEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '201':
          description: Événement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/user/reservations:
    get:
      tags: [Events]
      summary: Récupérer les réservations de l'utilisateur connecté
      operationId: getUserReservations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des réservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventReservation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/provider/reservations:
    get:
      tags: [Events]
      summary: Récupérer les réservations des événements d'un prestataire
      operationId: getProviderReservations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des réservations prestataire
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventReservation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/book:
    post:
      tags: [Events]
      summary: Réserver un événement
      operationId: bookEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
      responses:
        '201':
          description: Réservation créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventReservation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/{id}:
    get:
      tags: [Events]
      summary: Récupérer un événement par ID
      operationId: getEventById
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Événement trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Events]
      summary: Mettre à jour un événement
      operationId: updateEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '200':
          description: Événement mis à jour
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Events]
      summary: Supprimer un événement
      operationId: deleteEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Événement supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/{id}/reservations:
    get:
      tags: [Events]
      summary: Récupérer les réservations d'un événement
      operationId: getEventReservations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: Réservations récupérées
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventReservation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/{id}/schedules:
    post:
      tags: [Events]
      summary: Ajouter un créneau à un événement
      operationId: addSchedule
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_time, end_time]
              properties:
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
                capacity:
                  type: integer
                price:
                  type: number
      responses:
        '201':
          description: Créneau ajouté
        '401':
          $ref: '#/components/responses/Unauthorized'

  /events/schedules/{id}:
    put:
      tags: [Events]
      summary: Mettre à jour un créneau d'événement
      operationId: updateSchedule
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
                capacity:
                  type: integer
                price:
                  type: number
      responses:
        '200':
          description: Créneau mis à jour
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Events]
      summary: Supprimer un créneau d'événement
